name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # 正式ビルド: Native AOT(BUG-001 解消後に昇格。省メモリ・高速起動)
          - flavor: aot
            aot: "true"
            artifact: ExtendExprorer-win-x64
          # フォールバック: JIT ビルド(AOT 固有問題の切り分け用)
          - flavor: jit
            aot: "false"
            artifact: ExtendExprorer-win-x64-jit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish (win-x64, self-contained, unpackaged, ${{ matrix.flavor }})
        run: >
          dotnet publish src/ExtendExprorer/ExtendExprorer.csproj
          -c Release -r win-x64 -p:Platform=x64
          --self-contained true
          -p:PublishAot=${{ matrix.aot }}
          -o publish

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: publish
          retention-days: 30
